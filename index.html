<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코코클린 통합 관리센터</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; padding: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #007bff; text-align: center; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 16px; }
        .room-list { display: flex; flex-direction: column; gap: 15px; }
        .room-btn { display: block; padding: 15px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; text-decoration: none; color: #333; font-weight: bold; font-size: 18px; transition: all 0.2s; }
        .room-btn:hover { background: #007bff; color: #fff; border-color: #007bff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 코코클린 통합 관리센터 ✨</h1>
        <p class="subtitle">원하시는 원룸을 선택하시면 청소 리포트로 연결됩니다.</p>

        <div class="room-list">
            <a href="https://magical-saffron-bfc.notion.site" target="_blank" class="room-btn">
                📍 [원룸] 맥시멈빌 (북수리 1708) 리포트 보기
            </a>
            
            <a href="https://magical-saffron-bfc.notion.site" target="_blank" class="room-btn">
                📍 [원룸] 다음 원룸 이름 (준비중)
            </a>
            
            <a href="https://magical-saffron-bfc.notion.site" target="_blank" class="room-btn">
                📍 [원룸] 또 다른 원룸 이름 (준비중)
            </a>
        </div>
    </div>

</body>
</html>
